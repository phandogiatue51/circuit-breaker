apiVersion: v1
kind: ConfigMap
metadata:
  name: ms-config
data:
  ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=ToyStoryDb;User Id=sa;Password=Your_password123;TrustServerCertificate=True"
  ASPNETCORE_ENVIRONMENT: "Development"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: apigateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: apigateway
  template:
    metadata:
      labels:
        app: apigateway
    spec:
      containers:
      - name: apigateway
        image: apigateway:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: ms-config
---
apiVersion: v1
kind: Service
metadata:
  name: apigateway
spec:
  type: LoadBalancer
  selector:
    app: apigateway
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
---
# Similarly, add Deployments & Services for auth-service, brand-service, etc.
# For brevity, only APIGateway is shown fully in this example yaml.
